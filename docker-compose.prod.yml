services:
  db:
    image: postgres:16
    container_name: geo_serbia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geo_serbia_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    environment:
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASS: ${POSTGRES_PASSWORD}
      DATABASE_ADDRESS: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - backend_uploads:/app/src/static/uploads/locations

  frontend:
    build:
      context: ./frontend/geo-serbia-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: geo_serbia_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8080}:80"

volumes:
  pg_data:
  backend_uploads:
